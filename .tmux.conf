unbind C-b

set -g prefix C-f
bind C-f send-prefix

set -g base-index 1
setw -g pane-base-index 1

set-window-option -g automatic-rename on
set-option -g set-titles on
set-option -s set-clipboard off

set -g status-keys vi
set -g history-limit 15000

setw -g mode-keys vi
setw -g monitor-activity on
setw -g mouse on

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Use Alt-vim keys without prefix key to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left  resize-pane -L 4
bind -n M-Right resize-pane -R 4
bind -n M-Up    resize-pane -U 4
bind -n M-Down  resize-pane -D 4

# Shift arrow to switch windows
bind -n S-Left  previous-window
bind -n S-Right next-window
bind-key ä swap-pane \; select-pane -M \; last-pane

bind-key v split-window -h -c "#{pane_current_path}"
bind-key V split-window -h -b -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key S split-window -v -b -c "#{pane_current_path}"

# No delay for escape key press
set -sg escape-time 0

# Reload tmux config
bind r source-file ~/.tmux.conf

bind t send-keys ' tty-clock -s -c -C 3 -D; clear' Enter

bind-key Escape copy-mode            # enter copy mode; default [
bind-key p paste-buffer              # paste; (default hotkey: ] )
bind-key P choose-buffer             # tmux clipboard history

bind-key -T copy-mode-vi v send-keys -X begin-selection; \
bind-key -T copy-mode-vi V send-keys -X select-line; \
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle; \
bind-key -T choice-mode-vi h send-keys -X tree-collapse ; \
bind-key -T choice-mode-vi l send-keys -X tree-expand ; \
bind-key -T choice-mode-vi H send-keys -X tree-collapse-all ; \
bind-key -T choice-mode-vi L send-keys -X tree-expand-all ; \
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "xclip -in -selection clipboard"; \
bind-key -T copy-mode-vi y send-keys -X copy-pipe "xclip -in -selection clipboard"

# Emulate scrolling by sending up and down keys if these commands are running in the pane
tmux_commands_with_legacy_scroll="nano less more man git"

bind-key -T root WheelUpPane \
 if-shell -Ft= '#{?mouse_any_flag,1,#{pane_in_mode}}' \
   'send -Mt=' \
   'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
     "send -t= Up" "copy-mode -et="'

bind-key -T root WheelDownPane \
 if-shell -Ft = '#{?pane_in_mode,1,#{mouse_any_flag}}' \
   'send -Mt=' \
   'if-shell -t= "#{?alternate_on,true,false} || echo \"#{tmux_commands_with_legacy_scroll}\" | grep -q \"#{pane_current_command}\"" \
     "send -t= Down" "send -Mt="'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sidebar'

run '~/.tmux/plugins/tpm/tpm'

set -g @sidebar-tree-command 'LESS=; LESSCHARSET=utf-8; tree -C -L 3'
set -g @sidebar-tree-pager 'less -RSId'
set -g @sidebar-key-bspace "vim .,left,$COLUMNS,focus"

# styling

bgcolor=colour91
bgcolor=$TMUXCOLOR

set -g pane-border-style fg=colour242,'bg=colour236'
set -g pane-active-border-style fg=colour166,'bg=colour236'
set -g window-active-style bg='colour235'
set -g window-style 'bg=colour236'

set -wg mode-style bg=colour237,fg=colour202
set-window-option -g clock-mode-colour colour36

set -g status-bg 'colour235'
set -g status-fg white

# statusbar

set -g status-interval 1
set-window-option -g window-status-separator ''

set -g status-right '#(/home/moser/scripts/tmuxalert.sh) #[fg=colour166]| #[fg=colour249]%d/%m %H:%M:%S'
set -g status-left '                          '

set -g status-left-length 40
set -g status-right-length 40
set -g status-justify centre

set -g window-status-current-format "#[fg=colour36]#[bg=colour235] #[fg=black]#[bg=colour36]#I #[bg=brightblack]#[fg=white] #W#[fg=brightblack]#[bg=colour235] "
set -g window-status-format "#[fg=colour244]#[bg=colour235] #[fg=black]#[bg=colour244]#I #[bg=brightblack]#[fg=white] #W#[fg=brightblack]#[bg=colour235] "
